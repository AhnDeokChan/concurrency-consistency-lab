spring.application.name=backend-spring
server.port=5010
management.endpoints.web.exposure.include=health,info
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/app?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:app}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:app}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:redis}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5005}
app.async.product.core-pool-size=${APP_ASYNC_PRODUCT_CORE_POOL_SIZE:8}
app.async.product.max-pool-size=${APP_ASYNC_PRODUCT_MAX_POOL_SIZE:32}
app.async.product.queue-capacity=${APP_ASYNC_PRODUCT_QUEUE_CAPACITY:500}
app.async.product.thread-name-prefix=${APP_ASYNC_PRODUCT_THREAD_NAME_PREFIX:product-async-}
app.async.product.await-termination-seconds=${APP_ASYNC_PRODUCT_AWAIT_TERMINATION_SECONDS:30}
