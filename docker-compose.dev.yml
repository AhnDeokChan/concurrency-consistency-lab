services:
  frontend:
    image: node:22-alpine
    container_name: frontend-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- -p 5005 --hostname 0.0.0.0"
    environment:
      NEXT_PUBLIC_SPRING_API_URL: http://localhost:5010
      NEXT_PUBLIC_FASTAPI_API_URL: http://localhost:5020
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5005:5005"
    depends_on:
      project-spring:
        condition: service_started
      project-fastapi:
        condition: service_started
    networks:
      - app-net

  backend-spring-1:
    image: gradle:8.14.3-jdk25
    container_name: backend-spring-1-dev
    working_dir: /workspace
    command: gradle bootRun --no-daemon
    environment:
      INSTANCE_ID: spring-1
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/app?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: app
      SPRING_DATASOURCE_PASSWORD: app
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
    volumes:
      - ./backend-spring:/workspace
      - gradle_cache_1:/home/gradle/.gradle
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-net

  backend-spring-2:
    image: gradle:8.14.3-jdk25
    container_name: backend-spring-2-dev
    working_dir: /workspace
    command: gradle bootRun --no-daemon
    environment:
      INSTANCE_ID: spring-2
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/app?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: app
      SPRING_DATASOURCE_PASSWORD: app
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
    volumes:
      - ./backend-spring:/workspace
      - gradle_cache_2:/home/gradle/.gradle
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-net

  project-spring:
    image: nginx:1.27-alpine
    container_name: project-spring-dev
    volumes:
      - ./docker/project-spring/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend-spring-1
      - backend-spring-2
    ports:
      - "5010:5010"
    networks:
      - app-net

  backend-fastapi-1:
    image: python:3.14-slim
    container_name: backend-fastapi-1-dev
    working_dir: /app
    command: sh -c "pip install --no-cache-dir -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 5020 --reload"
    environment:
      INSTANCE_ID: fastapi-1
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - ./backend-fastapi:/app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-net

  backend-fastapi-2:
    image: python:3.14-slim
    container_name: backend-fastapi-2-dev
    working_dir: /app
    command: sh -c "pip install --no-cache-dir -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 5020 --reload"
    environment:
      INSTANCE_ID: fastapi-2
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - ./backend-fastapi:/app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-net

  project-fastapi:
    image: nginx:1.27-alpine
    container_name: project-fastapi-dev
    volumes:
      - ./docker/project-fastapi/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend-fastapi-1
      - backend-fastapi-2
    ports:
      - "5020:5020"
    networks:
      - app-net

  mysql:
    image: mysql:8.4
    container_name: mysql-dev
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "3306:3306"
    volumes:
      - ./db/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-net

  redis:
    image: redis:7.2-alpine
    container_name: redis-dev
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - ./db/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-net

networks:
  app-net:
    driver: bridge

volumes:
  frontend_node_modules:
  gradle_cache_1:
  gradle_cache_2:
