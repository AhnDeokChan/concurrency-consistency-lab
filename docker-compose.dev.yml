services:
  frontend:
    platform: linux/arm64/v8
    image: node:22-alpine
    container_name: frontend-dev
    working_dir: /app
    command: sh -c "corepack enable && corepack prepare pnpm@10.5.2 --activate && pnpm install && pnpm dev -- --hostname 0.0.0.0"
    environment:
      NEXT_PUBLIC_SPRING_API_URL: http://localhost:5010
      # NEXT_PUBLIC_FASTAPI_API_URL: http://localhost:5020
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5005:5005"
    depends_on:
      backend-spring:
        condition: service_started
    networks:
      - app-net

  backend-spring:
    image: gradle:jdk25-corretto
    container_name: backend-spring-dev
    working_dir: /workspace
    command: gradle bootRun --continuous --no-daemon
    environment:
      INSTANCE_ID: spring-dev
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/app?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: app
      SPRING_DATASOURCE_PASSWORD: app
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_DEVTOOLS_RESTART_POLL_INTERVAL: 1s
      SPRING_DEVTOOLS_RESTART_QUIET_PERIOD: 400ms
    volumes:
      - ./backend-spring:/workspace
      - gradle_cache:/home/gradle/.gradle
    ports:
      - "5010:5010"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-net

