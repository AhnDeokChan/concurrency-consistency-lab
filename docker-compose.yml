services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SPRING_API_URL: http://localhost:5010
      NEXT_PUBLIC_FASTAPI_API_URL: http://localhost:5020
    ports:
      - "5005:5005"
    depends_on:
      project-spring:
        condition: service_started
      project-fastapi:
        condition: service_started
    networks:
      - app-net

  backend-spring-1:
    build:
      context: ./backend-spring
      dockerfile: Dockerfile
    environment:
      INSTANCE_ID: spring-1
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/app?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: app
      SPRING_DATASOURCE_PASSWORD: app
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-net

  backend-spring-2:
    build:
      context: ./backend-spring
      dockerfile: Dockerfile
    environment:
      INSTANCE_ID: spring-2
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/app?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: app
      SPRING_DATASOURCE_PASSWORD: app
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-net

  project-spring:
    image: nginx:1.27-alpine
    container_name: project-spring
    volumes:
      - ./docker/project-spring/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend-spring-1
      - backend-spring-2
    ports:
      - "5010:5010"
    networks:
      - app-net

  backend-fastapi-1:
    build:
      context: ./backend-fastapi
      dockerfile: Dockerfile
    environment:
      INSTANCE_ID: fastapi-1
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-net

  backend-fastapi-2:
    build:
      context: ./backend-fastapi
      dockerfile: Dockerfile
    environment:
      INSTANCE_ID: fastapi-2
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-net

  project-fastapi:
    image: nginx:1.27-alpine
    container_name: project-fastapi
    volumes:
      - ./docker/project-fastapi/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend-fastapi-1
      - backend-fastapi-2
    ports:
      - "5020:5020"
    networks:
      - app-net

  mysql:
    image: mysql:8.4
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "3306:3306"
    volumes:
      - ./db/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-net

  redis:
    image: redis:7.2-alpine
    container_name: redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - ./db/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
